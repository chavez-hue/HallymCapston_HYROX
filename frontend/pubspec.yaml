name: hyrox_app
description: "RRP - Running Route Puzzle. GPS 경로로 도형을 완성하는 게임형 러닝 앱."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^8.0.0
  injectable: ^2.4.2
  go_router: ^14.0.0
  geolocator: ^13.0.0
  google_maps_flutter: ^2.9.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  hive_flutter: ^1.1.0
  permission_handler: ^11.3.1
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: assets/images/splash_logo.png
  color_dark: "#000000"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#000000"
    image: assets/images/splash_logo.png
    color_dark: "#000000"
    image_dark: assets/images/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/